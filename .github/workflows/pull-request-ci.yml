name: Pull request CI
on:
  pull_request:
    branches:
      - dev
jobs:
  test-build-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4.2.0
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version-file: '.nvmrc'
      - run: pnpm i
      - run: pnpm lint
      - name: Build 🔧
        run: pnpm build

name: Auto-merge Daily News PR

on:
  schedule:
    - cron: '0 1,7 * * *' # 4 hrs after fetch-news runs at 03:00 and 21:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}
    steps:
      - name: Find daily news PR
        id: find-pr
        run: |
          pr_number=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --author frsgit \
            --search "chore: daily news fetch in:title" \
            --state open \
            --base dev \
            --json number \
            --limit 1 \
            --jq '.[0].number // empty')

          if [ -z "$pr_number" ]; then
            echo "No open daily news PR found — nothing to do."
            echo "pr_number=" >> "$GITHUB_OUTPUT"
          else
            echo "Found PR #$pr_number"
            echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          fi

      - name: Check all CI statuses
        id: check-ci
        if: steps.find-pr.outputs.pr_number != ''
        run: |
          pr_number="${{ steps.find-pr.outputs.pr_number }}"

          # gh pr checks exits non-zero if any check failed/pending
          if gh pr checks "$pr_number" \
               --repo "$GITHUB_REPOSITORY" \
               --watch 2>/dev/null; then
            echo "All checks passed."
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::PR #$pr_number has checks that have not passed yet — skipping merge."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Squash & merge
        if: >-
          steps.find-pr.outputs.pr_number != '' &&
          steps.check-ci.outputs.ready == 'true'
        run: |
          pr_number="${{ steps.find-pr.outputs.pr_number }}"
          echo "Squash-merging PR #$pr_number…"
          gh pr merge "$pr_number" \
            --repo "$GITHUB_REPOSITORY" \
            --squash \
            --delete-branch
          echo "PR #$pr_number merged."
